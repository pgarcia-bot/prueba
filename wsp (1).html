<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prototipo Avalian - V3 Completa</title>
    <style>
        :root {
            --wa-green: #25d366;
            --wa-dark: #075e54;
            --wa-bg: #e5ddd5;
            --wa-msg-bot: #ffffff;
            --wa-msg-user: #dcf8c6;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .phone {
            width: 360px;
            height: 90dvh;
            background: var(--wa-bg);
            border-radius: 30px;
            border: 10px solid #222;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
        }

        .header {
            background: var(--wa-dark);
            color: white;
            padding: 40px 15px 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
        }

        .msg {
            padding: 8px 12px;
            border-radius: 10px;
            max-width: 85%;
            font-size: 13.5px;
            line-height: 1.4;
            animation: pop 0.25s ease-out;
            position: relative;
            white-space: pre-line;
            box-shadow: 0 1px 1px rgba(0, 0, 0, 0.1);
        }

        .bot {
            background: var(--wa-msg-bot);
            align-self: flex-start;
            border-top-left-radius: 0;
        }

        .user {
            background: var(--wa-msg-user);
            align-self: flex-end;
            border-top-right-radius: 0;
        }

        .typing {
            font-style: italic;
            font-size: 11px;
            color: #666;
            padding: 2px 15px;
            display: none;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin: 5px 0;
        }

        .opt-btn {
            background: white;
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 8px;
            color: #007bff;
            cursor: pointer;
            text-align: center;
            font-weight: 600;
            font-size: 13px;
        }

        .input-box {
            background: #f0f0f0;
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        input[type="text"] {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 20px;
            outline: none;
            font-size: 14px;
        }

        .icon-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
        }

        .attach-btn {
            background: #54656f;
        }

        .send-btn {
            background: var(--wa-green);
        }

        .hidden {
            display: none !important;
        }

        @keyframes pop {
            from {
                opacity: 0;
                transform: scale(0.98);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <div class="phone">
        <div class="header">
            <div class="avatar">🤖</div>
            <div>
                <div style="font-weight: 600; font-size: 14px;">Ava - Asistente Avalian</div>
                <div id="status" style="font-size: 11px; opacity: 0.9;">en línea</div>
            </div>
        </div>
        <div class="chat" id="chat"></div>
        <div id="typing-indicator" class="typing">Ava está escribiendo...</div>
        <div class="input-box">
            <input type="file" id="fileInput" class="hidden" onchange="handleFile(event)">
            <button class="icon-btn attach-btn" onclick="document.getElementById('fileInput').click()">📎</button>
            <input type="text" id="userInput" placeholder="Escribe un mensaje..." autocomplete="off">
            <button class="icon-btn send-btn" onclick="handleSend()">➤</button>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const uInput = document.getElementById('userInput');
        const status = document.getElementById('status');
        const typing = document.getElementById('typing-indicator');

        let step = 'START';
        let subStep = 0;
        let prestacionSelected = '';
        let hasActiveProject = false;
        const cuitPrestador = '20304050607';

        // para cambiar de paso escribir step=VALOR (ejemplo: step=MENU)

        const TEXT_STEPS = new Set(['DNI', 'MENU', 'ESCOLAR_CUE', 'CUIT_PRESTADOR']);
        const FILE_STEPS = new Set(['UPLOAD_INICIAL', 'UPLOAD_INICIAL_HC', 'DOC_PERSONAL', 'DOC_PRESTADOR', 'UPLOAD_TERAPIA', 'ESCOLAR_CERT', 'UPLOAD_FIM']);

        const DOC_PERSONAL_LIST = ["1. CUD Vigente", "2. DNI del asociado", "3. Historia Clínica - Anexo I", "4. Conformidad Prestacional - Anexo III"];
        const DOC_PRESTADOR_LIST = ["CBU", "RNP", "ARCA", "Póliza de Seguro", "Título"];
        const DOC_TERAPIA_LIST = ["Pedido médico - Anexo II", "Presupuesto - Anexo IV", "Plan de Trabajo e informe - Anexo V"];

        function addMsg(text, type = 'bot') {
            const d = document.createElement('div'); d.className = `msg ${type}`; d.innerText = text;
            chat.appendChild(d); chat.scrollTop = chat.scrollHeight;
        }

        function waitAva(callback, time = 800) {
            status.innerText = "escribiendo..."; typing.style.display = "block";
            setTimeout(() => { status.innerText = "en línea"; typing.style.display = "none"; callback(); }, time);
        }

        function validateExpectedInput(inputType) {
            if (inputType === 'text') {
                if (FILE_STEPS.has(step)) {
                    waitAva(() => addMsg("¡Gracias por escribir! En este momento no necesito texto. Para este paso necesito que me adjuntes un archivo 📎"));
                    return false;
                }
                if (!TEXT_STEPS.has(step)) {
                    waitAva(() => addMsg("¡Gracias por escribir! En este momento no necesito texto. Elegí una opción del menú y te voy guiando 😊"));
                    return false;
                }
                return true;
            }

            if (inputType === 'file') {
                if (TEXT_STEPS.has(step)) {
                    waitAva(() => addMsg("¡Gracias por el archivo! Ahora no hace falta adjuntar nada. En este paso necesito que me lo escribas por mensaje ✍️"));
                    return false;
                }
                if (!FILE_STEPS.has(step)) {
                    waitAva(() => addMsg("¡Gracias por el archivo! Ahora no hace falta adjuntar nada. Seguí las opciones del menú y avanzamos juntos 😊"));
                    return false;
                }
                return true;
            }

            return true;
        }

        function handleSend() {
            const val = uInput.value.trim(); if (!val) return;
            addMsg(val, 'user'); uInput.value = '';

            if (!validateExpectedInput('text')) return;

            // mandar step=X para cambiar de paso
            if (val.toLowerCase().includes("step=")) {
                const parts = val.split("=");
                if (parts.length > 1) {
                    step = parts[1].trim(); // Asignar el valor después de "step="
                    addMsg(`Cambiando al paso: ${step}`);
                } else {
                    addMsg("Formato incorrecto. Usa 'step=valor'.");
                }
                return;
            }

            if (step === 'DNI') {
                waitAva(() => { addMsg("Elegí una opción: 👇\n1. Consulta virtual\n8. Discapacidad"); step = 'MENU'; });
            }
            else if (step === 'MENU' && val === '8') {
                if (!hasActiveProject) {
                    waitAva(() => {
                        addMsg("Aún no tienes el portal habilitado. 🚫\n¿Querés habilitarlo ahora?");
                        showOptions(["Habilitar"], () => { waitAva(() => { addMsg("Por favor, enviame tu CUD vigente para habilitar el portal. 📎"); step = 'UPLOAD_INICIAL'; }); });
                    });
                } else {
                    mainPortalMenu();
                }
            }
            else if (step === 'ESCOLAR_CUE') {
                waitAva(() => {
                    addMsg("Validando... ⏳");
                    setTimeout(() => {
                        addMsg(`¿Establecimiento: "Escuela Normal N°1"?`);
                        showOptions(["SÍ", "NO"], (res) => { if (res === "SÍ") cierrePersonal(); else addMsg("Ingresá el CUE nuevamente."); });
                    }, 15000);
                });
            }
            else if (step === 'CUIT_PRESTADOR') {
                waitAva(() => {
                    addMsg("Validando CUIT... ⏳");
                    if (val === cuitPrestador) {
                        addMsg("✅ Profesional: Lic. Pérez, Juan.");
                        documentacionTerapia();
                    } else {
                        addMsg('⚠️ Prestador fuera de cartilla. Sujeto a auditoría.')
                        waitAva(() => {
                            step = 'DOC_PRESTADOR'; subStep = 0;
                            addMsg(`Adjuntame documentación del prestador: ${DOC_PRESTADOR_LIST[subStep]}`);
                        });
                    }
                });
            }
        }

        function mainPortalMenu() {
            waitAva(() => {
                addMsg("Portal de Discapacidad ♿. ¿Qué gestión necesitás?");
                showOptions(["📂 Nuevo Proyecto", "🔍 Seguimiento", "✏️ Modificar Proyecto"], (opt) => {
                    if (opt.includes("Nuevo")) startProyectoFlow();
                    else if (opt.includes("Seguimiento")) showTracking();
                    else if (opt.includes("Modificar")) showModificationMenu();
                });
            });
        }

        function showTracking() {
            waitAva(() => {
                addMsg("Tus gestiones actuales:\n\n📄 Proyecto #348821\nEstado: 🟠 En Auditoría Médica\nFecha: 28/03/2026\n\n¿Deseas ver el detalle de alguna prestación?");
                showOptions(["Volver"], (o) => { if (o === "Volver") mainPortalMenu(); });
            });
        }

        function showModificationMenu() {
            waitAva(() => {
                addMsg("⚠️ Nota: Solo se pueden modificar prestaciones si el proyecto base está autorizado.\n\nProyecto #348821:\n¿Qué acción deseas realizar?");
                showOptions(["➕ Agregar Prestación", "🔄 Editar Existente", "❌ Baja de Prestación", "⬅️ Volver"], (opt) => {
                    if (opt.includes("Volver")) mainPortalMenu();
                    else if (opt.includes("Editar") || opt.includes("Baja")) {
                        addMsg("Seleccioná la prestación del listado:");
                        showOptions(["Psicología", "Kinesiología"], () => {
                            waitAva(() => {
                                addMsg("Tu solicitud ha sido enviada a auditoría para validar el cambio. ✅");
                                mainPortalMenu();
                            });
                        });
                    } else {
                        startPrestacionesMenu();
                    }
                });
            });
        }

        function handleFile(event) {
            const file = event.target.files[0]; if (!file) return;
            event.target.value = '';
            addMsg("📄 " + file.name, 'user');

            if (!validateExpectedInput('file')) return;

            if (step === 'UPLOAD_INICIAL') {
                waitAva(() => { addMsg("¡Recibido! ✅ Ahora enviame el Resumen de Historia Clínica."); step = 'UPLOAD_INICIAL_HC'; });
            }
            else if (step === 'UPLOAD_INICIAL_HC') {
                waitAva(() => {
                    addMsg("Estamos procesando tu solicitud. Te notificaremos en breve cuando el portal esté habilitado. ⏳");
                    setTimeout(() => {
                        hasActiveProject = true;
                        addMsg("¡Hola de nuevo! 🎉 Te informamos que el portal ya está habilitado y listo para usar. ✅");
                        mainPortalMenu();
                    }, 10000);
                });
            }
            else if (step === 'DOC_PERSONAL') {
                subStep++;
                if (subStep < DOC_PERSONAL_LIST.length) waitAva(() => addMsg(`Recibido. ✅ Ahora: ${DOC_PERSONAL_LIST[subStep]}`));
                else {
                    waitAva(() => {
                        addMsg("¿Asociado en edad escolar?");
                        showOptions(["SÍ", "NO"], (e) => { if (e === "SÍ") { addMsg("Adjuntá Certificado Escolar."); step = 'ESCOLAR_CERT'; } else cierrePersonal(); });
                    });
                }
            }
            else if (step === 'DOC_PRESTADOR') {
                subStep++;
                if (subStep < DOC_PRESTADOR_LIST.length) waitAva(() => addMsg(`Recibido. ✅ Ahora: ${DOC_PRESTADOR_LIST[subStep]}`));
                else {
                    waitAva(() =>
                        addMsg("Recibido. ✅")
                    )
                    documentacionTerapia();
                }
            }
            else if (step === 'UPLOAD_TERAPIA') {
                subStep++;
                if (subStep < DOC_TERAPIA_LIST.length) { waitAva(() => addMsg("Recibido. ✅ Ahora: " + DOC_TERAPIA_LIST[subStep])); }
                else {
                    waitAva(() => {
                        addMsg("¿Agregar otra prestación o finalizar?");
                        showOptions(["Agregar otra", "Finalizar"], (f) => { if (f === "Finalizar") poseeDependencia(); else startPrestacionesMenu(); });
                    });
                }
            }
            else if (step === 'ESCOLAR_CERT') { waitAva(() => { addMsg("¡Recibido! ✅ Escribí el CUE de la institución."); step = 'ESCOLAR_CUE'; }); }

            else if (step === 'UPLOAD_FIM') {
                waitAva(() => {
                    addMsg("¡Recibido! ✅");
                    finishProyecto();
                });
            }
        }

        function startProyectoFlow() {
            waitAva(() => {
                addMsg("Vamos con Proyecto Anual de Rehabilitación.\n¿Iniciamos con Doc. Personal?");
                showOptions(["SÍ"], () => { step = 'DOC_PERSONAL'; subStep = 0; addMsg(`Adjuntame ${DOC_PERSONAL_LIST[subStep]}`); });
            });
        }

        function startPrestacionesMenu() {
            waitAva(() => {
                addMsg("Elegí la prestación 👇");
                showOptions(["Psicología", "Psicopedagogía"], (p) => {
                    prestacionSelected = p;
                    waitAva(() => { addMsg(`Ingresá el CUIT del Prestador para ${p}.`); step = 'CUIT_PRESTADOR'; });
                });
            });
        }

        function cierrePersonal() {
            waitAva(() => {
                addMsg("Doc. personal completa. 🚀\n¿Confirmás el envío para pasar a prestaciones?");
                showOptions(["Confirmar"], () => startPrestacionesMenu());
            });
        }

        function documentacionTerapia() {
            waitAva(() => {
                addMsg('Ahora te pediremos la documentación de la terapia')
                waitAva(() => {
                    subStep = 0;
                    addMsg("Adjuntá " + DOC_TERAPIA_LIST[subStep]);
                    step = 'UPLOAD_TERAPIA';
                }
                )
            });
        }

        function poseeDependencia() {
            waitAva(() => {
                addMsg("¿Posee Dependencia?");
                showOptions(["SÍ", "NO"], (respuesta) => {
                    if (respuesta === "SÍ") {
                        waitAva(() => { addMsg("Por favor, adjuntá la Escala FIM - Anexo  IX."); step = 'UPLOAD_FIM'; });
                    } else {
                        finishProyecto();
                    }
                });
            });
        }

        function finishProyecto() {
            waitAva(() => {
                addMsg("¡Proyecto enviado! 🎊\nNro: #348821.");
                mainPortalMenu();
            });
        }

        function showOptions(opts, callback) {
            const div = document.createElement('div'); div.className = 'options-container';
            opts.forEach(o => {
                const b = document.createElement('button'); b.className = 'opt-btn'; b.innerText = o;
                b.onclick = () => { div.remove(); addMsg(o, 'user'); callback(o); }; div.appendChild(b);
            });
            chat.appendChild(div);
        }

        window.onload = () => { waitAva(() => { addMsg("¡Hola! Soy Ava. ¿Sos asociado?"); showOptions(["Soy asociado"], () => { step = 'DNI'; waitAva(() => addMsg("Ingresá tu DNI.")); }); }); }
    </script>
</body>

</html>
